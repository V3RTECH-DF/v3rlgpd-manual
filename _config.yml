title: V3RLGPD
description: "Manual do usuário e Guia da LGPD para Organizações da Sociedade Civil — V3RLGPD, pela RIT."
lang: pt-BR
url: https://docs.v3rlgpd.v3rtech.com.br
permalink: pretty

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Tema / cor
color_scheme: v3rlgpd
logo: "/assets/logo.png"

# Busca
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Callouts (admonitions) — casam com os pedidos do #10
callouts:
  note:
    title: Nota
    color: blue
  tip:
    title: Boas práticas
    color: green
  warning:
    title: Atenção
    color: yellow
  important:
    title: Importante
    color: red
  example:
    title: Exemplo
    color: purple

# Links auxiliares (canto superior direito)
aux_links:
  "Acessar a RIT":
    - "https://rit.org.br"
aux_links_new_tab: true

# Rodapé
footer_content: '© 2026 <a href="https://rit.org.br" target="_blank" rel="noopener">RIT — Rede de Inovação e Transformação</a> · <a href="https://v3rtech.com.br/" target="_blank" rel="noopener">V3RTECH</a>. Este guia ajuda sua OSC a se organizar para a LGPD, mas não substitui aconselhamento jurídico. · <a href="/disclaimer/">Aviso legal</a>'
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Voltar ao topo"

# Excluir do build
exclude:
  - "*.sh"
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
